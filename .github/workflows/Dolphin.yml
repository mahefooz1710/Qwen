name: MAHEFOOZ1710 Dolphin Skylake + GDrive Upload

on:
  workflow_dispatch:

env:
  # Global build config
  BUILD_TYPE: Release
  OPT_FLAGS: "-O3 -march=skylake -mtune=skylake -pipe -fno-plt"
  GDRIVE_FOLDER_ID: "1H28ejDbHH8c_sRBq7tL4YxI6oOUmFgBr"

jobs:
  build-dolphin:
    name: Build Dolphin — Dell Optiplex 7050 i3-6100
    runs-on: ubuntu-22.04

    steps:
      # ────────────────────────────────────────────────────────
      # STEP 0: Build Cache (Speeds up repeated builds ~40%)
      # ────────────────────────────────────────────────────────
      - name: Cache CMake/Ninja Build Artifacts
        uses: actions/cache@v4
        with:
          path: |
            build/CMakeCache.txt
            build/CMakeFiles
            build/Source
            build/Data
            build/Binaries
          key: ${{ runner.os }}-dolphin-skylake-${{ hashFiles('**/CMakeLists.txt', '**/Source/**/*.cpp') }}
          restore-keys: |
            ${{ runner.os }}-dolphin-skylake-
      # ────────────────────────────────────────────────────────
      # STEP 1: System Check
      # ────────────────────────────────────────────────────────
      - name: System Reality Check
        run: |
          echo "=========================================="
          echo "  🖥️  OS   : $(lsb_release -d | cut -f2)"
          echo "  ⚙️  Cores: $(nproc)"
          echo "  🧠 RAM  : $(free -h | awk '/^Mem/{print $2}')"
          echo "  🎮 Target: Skylake i3-6100 (AVX2+FMA)"
          echo "=========================================="

      # ────────────────────────────────────────────────────────
      # STEP 2: Checkout Dolphin Source
      # fetch-depth: 0 → ensures submodules clone properly
      # ────────────────────────────────────────────────────────
      - name: Checkout Dolphin Source
        uses: actions/checkout@v4
        with:
          repository: 'dolphin-emu/dolphin'
          submodules: recursive
          fetch-depth: 0

      # ────────────────────────────────────────────────────────
      # STEP 3: Compiler + Build Tools
      # ────────────────────────────────────────────────────────
      - name: Install Compiler + Build Tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            gcc-12 g++-12 \
            cmake ninja-build \
            git build-essential pkg-config \
            binutils-gold
          # Verify gold linker is available
          if [ ! -f /usr/bin/ld.gold ]; then
            echo "❌ gold linker not found!"
            exit 1
          fi
          echo "✅ GCC 12 + gold linker ready"

      # ────────────────────────────────────────────────────────
      # STEP 4: Dependencies (Modular for Easy Debugging)
      # ────────────────────────────────────────────────────────
      - name: Install FFmpeg Libraries
        run: |
          sudo apt-get install -y \
            libavcodec-dev libavformat-dev libavutil-dev \
            libswscale-dev libswresample-dev
      - name: Install Controller + Input Libraries
        run: |
          sudo apt-get install -y \
            libsdl2-dev libsdl2-2.0-0 \
            libevdev-dev libudev-dev libhidapi-dev

      - name: Install Display Libraries
        run: |
          sudo apt-get install -y \
            libx11-dev libxext-dev libxrandr-dev \
            libxi-dev libx11-xcb-dev

      - name: Install Audio Libraries
        run: |
          sudo apt-get install -y \
            libasound2-dev libpulse-dev

      - name: Install Graphics Libraries
        run: |
          sudo apt-get install -y \
            libgl1-mesa-dev libvulkan-dev \
            libva-dev \
            intel-media-va-driver  # [C1] Correct Gen9 VA-API driver

      - name: Install Network + Compression Libraries
        run: |
          sudo apt-get install -y \
            libcurl4-openssl-dev libmbedtls-dev libminiupnpc-dev \
            libzstd-dev liblzo2-dev libbz2-dev

      - name: Install Misc Libraries
        run: |
          sudo apt-get install -y \
            libbluetooth-dev gettext
          # [L1] libpugixml-dev intentionally skipped - Dolphin bundles it

      - name: Install Qt6 GUI
        run: |
          # [C2] qt6-qpa-plugins instead of qt6-wayland
          sudo apt-get install -y \
            qt6-base-dev \
            libqt6svg6-dev \
            qt6-qpa-plugins || true
          
          # Optional private headers (may not exist in Ubuntu 22.04 repos)
          sudo apt-get install -y qt6-base-private-dev 2>/dev/null || \
            echo "⚠️ qt6-base-private-dev not available, continuing without"

      # ────────────────────────────────────────────────────────      # STEP 5: Install Latest Rclone (not apt version)
      # ────────────────────────────────────────────────────────
      - name: Install Rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash
          echo "📦 rclone: $(rclone --version | head -1)"

      # ────────────────────────────────────────────────────────
      # STEP 6: Setup Rclone → Google Drive
      # [F2] Fixed: robust remote detection + valid rclone test command
      # ────────────────────────────────────────────────────────
      - name: Setup Rclone for Google Drive
        env:
          RCLONE_CONFIG_BASE64: ${{ secrets.RCLONE_CONFIG_BASE64 }}
        run: |
          if [ -z "$RCLONE_CONFIG_BASE64" ]; then
            echo "⚠️  RCLONE_CONFIG_BASE64 secret not set!"
            echo "   GDrive upload will be skipped."
            echo "RCLONE_AVAILABLE=false" >> $GITHUB_ENV
          else
            mkdir -p ~/.config/rclone
            # [C3] Safe multiline base64 decode via printf pipe
            printf '%s' "$RCLONE_CONFIG_BASE64" | base64 -d > ~/.config/rclone/rclone.conf
            
            # [M3] Robust remote name extraction (handles whitespace/empty)
            REMOTE_NAME=$(rclone listremotes 2>/dev/null | grep -o '^[^:]*' | head -1 | xargs)
            if [ -z "$REMOTE_NAME" ]; then
              echo "❌ No valid rclone remote found in config!"
              echo "RCLONE_AVAILABLE=false" >> $GITHUB_ENV
              exit 0  # Soft fail - don't break entire workflow
            fi
            echo "REMOTE_NAME=$REMOTE_NAME" >> $GITHUB_ENV
            echo "🔍 Detected remote: ${REMOTE_NAME}"

            # [F2] Fixed: rclone lsd doesn't support --max-depth
            if rclone lsd "${REMOTE_NAME}:" >/dev/null 2>&1; then
              echo "✅ Google Drive connection: OK"
              echo "RCLONE_AVAILABLE=true" >> $GITHUB_ENV
            else
              echo "⚠️  GDrive connection test failed"
              echo "   Check your rclone.conf or network access"
              echo "RCLONE_AVAILABLE=false" >> $GITHUB_ENV
            fi
          fi

      # ────────────────────────────────────────────────────────
      # STEP 7: CMake Configure
      # [F1] CORRECT CMake flags: USE_X11, USE_WAYLAND, USE_SDL2
      # ────────────────────────────────────────────────────────
      - name: Configure CMake (Skylake i3-6100 Optimized)        run: |
          mkdir build && cd build

          echo "🔧 Configuring with:"
          echo "   Compiler : GCC 12"
          echo "   Linker   : gold (GCC LTO compatible)"
          echo "   Flags    : ${{ env.OPT_FLAGS }}"
          echo "   Target   : Skylake (AVX2+FMA)"

          if ! cmake .. \
            -GNinja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DCMAKE_C_COMPILER=gcc-12 \
            -DCMAKE_CXX_COMPILER=g++-12 \
            -DCMAKE_C_FLAGS="${{ env.OPT_FLAGS }}" \
            -DCMAKE_CXX_FLAGS="${{ env.OPT_FLAGS }}" \
            -DCMAKE_EXE_LINKER_FLAGS="-fuse-ld=gold" \
            -DCMAKE_SHARED_LINKER_FLAGS="-fuse-ld=gold" \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DENABLE_LTO=ON \
            -DUSE_X11=ON \
            -DUSE_WAYLAND=ON \
            -DUSE_SDL2=ON \
            2>&1 | tee /tmp/cmake-configure.log; then
            echo "❌ CMake configuration FAILED!"
            echo "📋 Last 50 lines of configure log:"
            tail -50 /tmp/cmake-configure.log
            exit 1
          fi

          # Verify critical features are enabled
          echo ""
          echo "✅ CMake configure successful!"
          grep -E "X11.*enabled|Wayland.*enabled|SDL2.*enabled" /tmp/cmake-configure.log || \
            echo "⚠️  Warning: Some GUI backends may not show as enabled in log"

      # ────────────────────────────────────────────────────────
      # STEP 8: Compile
      # ────────────────────────────────────────────────────────
      - name: Compile Dolphin
        run: |
          cd build
          CORES=$(nproc)
          echo "🚀 Build starting with ${CORES} parallel jobs..."
          echo "   Memory check: $(free -h | awk '/^Mem/{print $3" used / "$2" total"}')"
          
          if ninja -j${CORES}; then
            echo "✅ Build complete!"
          else
            echo "❌ Build FAILED!"            exit 1
          fi

      # ────────────────────────────────────────────────────────
      # STEP 9: Package Build
      # ────────────────────────────────────────────────────────
      - name: Package Build
        run: |
          cd build
          DESTDIR=${{ github.workspace }}/dolphin-install ninja install
          cd ${{ github.workspace }}

          BUILD_DATE=$(date +%Y%m%d)
          TAR_NAME="dolphin-ubuntu22.04-skylake-i3-6100-${BUILD_DATE}.tar.gz"
          
          echo "📦 Creating package: ${TAR_NAME}"
          tar -czvf "${TAR_NAME}" -C dolphin-install .

          echo ""
          echo "✅ Package created:"
          echo "   Name : ${TAR_NAME}"
          echo "   Size : $(du -sh "${TAR_NAME}" | cut -f1)"
          
          echo "TAR_NAME=${TAR_NAME}" >> $GITHUB_ENV

      # ────────────────────────────────────────────────────────
      # STEP 10: GitHub Artifacts Backup (Always Runs)
      # ────────────────────────────────────────────────────────
      - name: Upload to GitHub Artifacts (Backup)
        uses: actions/upload-artifact@v4
        with:
          name: Dolphin-MAHEFOOZ1710-Skylake
          path: ${{ env.TAR_NAME }}
          retention-days: 30
          compression-level: 6

      # ────────────────────────────────────────────────────────
      # STEP 11: Google Drive Upload (Conditional)
      # ────────────────────────────────────────────────────────
      - name: Upload to Google Drive
        if: env.RCLONE_AVAILABLE == 'true'
        run: |
          echo "📤 Uploading ${{ env.TAR_NAME }} to Google Drive..."
          echo "   Remote : ${REMOTE_NAME}"
          echo "   Folder : ${{ env.GDRIVE_FOLDER_ID }}"
          
          if rclone copy "${{ env.TAR_NAME }}" \
            "${REMOTE_NAME}:" \
            --drive-root-folder-id "${{ env.GDRIVE_FOLDER_ID }}" \
            --progress \            --stats 30s \
            --retries 3 \
            --retries-sleep 10s \
            --create-empty-src-dirs \
            2>&1 | tee /tmp/rclone-upload.log; then
            echo "✅ Google Drive upload successful!"
            echo "🔗 https://drive.google.com/drive/folders/${{ env.GDRIVE_FOLDER_ID }}"
          else
            echo "❌ Google Drive upload FAILED!"
            echo "📋 Last 20 lines of upload log:"
            tail -20 /tmp/rclone-upload.log
            exit 1
          fi

      - name: Skip GDrive Upload (Info)
        if: env.RCLONE_AVAILABLE == 'false'
        run: |
          echo "⏭️  Google Drive upload skipped"
          echo "   Reason: RCLONE_CONFIG_BASE64 not set OR connection test failed"
          echo "   ✅ Build still available in GitHub Artifacts (30 days)"

      # ────────────────────────────────────────────────────────
      # STEP 12: Build Summary
      # ────────────────────────────────────────────────────────
      - name: 🎉 Build Summary
        run: |
          echo ""
          echo "╔════════════════════════════════════════════════════════╗"
          echo "║   🐬 MAHEFOOZ1710 DOLPHIN BUILD — COMPLETE ✅          ║"
          echo "╠════════════════════════════════════════════════════════╣"
          echo "║  📦 Package  : ${{ env.TAR_NAME }}"
          echo "║  ⚙️  Compiler : GCC 12 (C++20) + gold linker"
          echo "║  🎯 Target   : Skylake i3-6100 (AVX2 + FMA)"
          echo "║  🎮 SDL2     : YES — Cosmic Byte Stelleris + Rumble"
          echo "║  🎬 VA-API   : YES — intel-media-va-driver (HD 530)"
          echo "║  ⚡ LTO      : YES — via gold (GCC compatible)"
          echo "╠════════════════════════════════════════════════════════╣"
          echo "║  📥 INSTALL INSTRUCTIONS:                              ║"
          echo "║  1. tar -xzf <file.tar.gz> -C /                        ║"
          echo "║  2. sudo ldconfig                                      ║"
          echo "║  3. dolphin-emu                                        ║"
          echo "║                                                        ║"
          echo "║  🎮 CONTROLLER SETUP (Cosmic Byte Stelleris):         ║"
          echo "║  • Dolphin → Controllers → Port 1 → SDL/evdev         ║"
          echo "║  • Settings → Controller → Rumble: ON                 ║"
          echo "║  • ff-memless auto-loads on Ubuntu 22.04              ║"
          echo "╚════════════════════════════════════════════════════════╝"
