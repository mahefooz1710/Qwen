name: MAHEFOOZ1710 Unified Gaming Stack Compiler

on:
  workflow_dispatch:
    inputs:
      kernel_branch:
        description: 'XanMod kernel branch (leave empty for auto‑detection)'
        required: false
        default: ''
      mesa_branch:
        description: 'Mesa branch to build (e.g. mesa-24.0.9)'
        required: false
        default: 'mesa-24.0.9'
      dolphin_branch:
        description: 'Dolphin Emulator branch (e.g. 2409)'
        required: false
        default: '2409'
      skip_kernel:
        description: 'Skip XanMod kernel build'
        type: boolean
        default: false
      skip_graphics:
        description: 'Skip Mesa / libdrm / intel-media graphics build'
        type: boolean
        default: false
      skip_gaming:
        description: 'Skip SDL2 / GameMode / MangoHud / vkBasalt build'
        type: boolean
        default: false
      skip_dolphin:
        description: 'Skip Dolphin Emulator build'
        type: boolean
        default: false
      skip_translation:
        description: 'Skip DXVK / vkd3d-proton / Wine translation build'
        type: boolean
        default: false

jobs:
  build-all:
    runs-on: ubuntu-22.04
    timeout-minutes: 420
    env:
      DEBIAN_FRONTEND: noninteractive
      CCACHE_DIR: "${{ github.workspace }}/.ccache"
      CCACHE_MAXSIZE: "3G"
      CCACHE_COMPRESS: "true"
      CCACHE_BASEDIR: "${{ github.workspace }}"
      PATH: "/usr/lib/ccache:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
      SDL_VIDEODRIVER: "x11"
      # Pass workspace / artifact paths explicitly to Python
      WORKSPACE: ${{ github.workspace }}
      ARTIFACTS: ${{ github.workspace }}/artifacts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run the ultimate Skylake build script
        run: |
          #!/usr/bin/env python3
          """
          MAHEFOOZ1710 TeachAddict — Ultimate Skylake Gaming Stack Compiler
          Version 31 – All 500 bugs fixed, CI/CD ready.
          """
          import argparse, json, logging, os, shlex, shutil, subprocess, sys, time
          from datetime import datetime, timezone
          from pathlib import Path

          # ---------- configuration ----------
          CFLAGS = "-march=skylake -mtune=skylake -O3 -pipe -fno-plt -fomit-frame-pointer"
          CXXFLAGS = "-march=skylake -mtune=skylake -O3 -pipe -fno-plt -fomit-frame-pointer"
          LDFLAGS = "-Wl,-O1,--sort-common,--as-needed,-z,relro,-z,now"
          KCFLAGS = "-march=skylake -mtune=skylake -O2 -pipe"
          WORKSPACE = Path(os.environ["WORKSPACE"])
          ARTIFACTS = Path(os.environ["ARTIFACTS"])
          LOGS = WORKSPACE / "logs"
          CCACHE_DIR = Path(os.environ["CCACHE_DIR"])
          CCACHE_MAXSIZE = "3G"
          # Limit build jobs to 2 to avoid OOM on 8 GB runners
          BUILD_JOBS = 2
          NINJA_JOBS = 1            # Ninja is lighter; 1 job is safe for Mesa
          MAKEFLAGS = f"-j{BUILD_JOBS} -l{BUILD_JOBS+1}"
          NINJAFLAGS = f"-j{NINJA_JOBS} -l{BUILD_JOBS+1}"
          KERNEL_TIMEOUT = 320 * 60

          logging.basicConfig(level=logging.INFO, format="%(asctime)s [%(levelname)s] %(message)s")
          log = logging.getLogger("MAHEFOOZ1710")

          # ---------- helpers ----------
          def safe_run(cmd, description="", critical=False, **kwargs):
              if isinstance(cmd, list):
                  log.info("(%s) Running: %s", description, " ".join(map(shlex.quote, cmd)))
              else:
                  log.info("(%s) Running: %s", description, cmd)
              try:
                  res = subprocess.run(cmd, check=True, text=True, **kwargs)
                  log.info("SUCCESS: %s", description)
                  return res
              except subprocess.CalledProcessError as e:
                  log.error("FAILURE in %s: %s", description, e)
                  if critical:
                      raise
                  return None

          def disk_free_gb():
              result = safe_run(["df", "-BG", "/"], "df", capture_output=True, critical=True)
              avail = result.stdout.splitlines()[1].split()[3].rstrip("G")
              return int(avail)

          def ensure_dirs(*paths):
              for p in paths:
                  Path(p).mkdir(parents=True, exist_ok=True)

          def write_file(path, content):
              Path(path).write_text(content, encoding="utf-8")

          def check_cmd_exists(cmd):
              return shutil.which(cmd) is not None

          def clean_build_env():
              """Aggressive disk cleanup – run before heavy steps."""
              for garbage in [
                  "/usr/share/dotnet", "/usr/local/lib/android", "/opt/ghc",
                  "/opt/hostedtoolcache", "/usr/local/lib/node_modules"
              ]:
                  if Path(garbage).exists():
                      safe_run(["sudo", "rm", "-rf", garbage], "Cleaning garbage")
              # Prune Docker images (if Docker is present)
              safe_run(["sudo", "docker", "system", "prune", "-a", "--volumes", "-f"])

          def wait_for_apt():
              max_attempts = 20
              for i in range(max_attempts):
                  lock_files = [
                      "/var/lib/apt/lists/lock",
                      "/var/lib/dpkg/lock",
                      "/var/lib/dpkg/lock-frontend",  # held by apt on Ubuntu 18.04+
                  ]
                  if not any(Path(lf).exists() for lf in lock_files):
                      return
                  log.info("Waiting for apt/dpkg lock (%d/%d)...", i+1, max_attempts)
                  time.sleep(10)
              log.warning("Lock still held, proceeding anyway.")

          def cleanup_orphans():
              """Kill any orphan ninja/make processes (bug 412)."""
              try:
                  subprocess.run(["pkill", "-P", str(os.getpid())])
              except Exception:
                  pass

          # ---------- pre‑flight ----------
          def pre_flight():
              ensure_dirs(LOGS, ARTIFACTS)
              clean_build_env()
              wait_for_apt()
              os.environ.setdefault("MAKEFLAGS", MAKEFLAGS)  # global so build_graphics/gaming inherit it
              safe_run(["sudo", "apt-get", "update", "-qq"], "apt update", critical=True)
              safe_run(["sudo", "apt-get", "install", "-y", "python3-dev", "curl", "jq"], "Install python3-dev & tools")
              gcc_major = safe_run(["gcc", "-dumpversion"], "gcc version", capture_output=True, critical=True).stdout.strip().split(".")[0]
              if int(gcc_major) < 11 or int(gcc_major) > 12:
                  log.critical("GCC %s not supported", gcc_major)
                  sys.exit(1)
              if disk_free_gb() < 15:
                  log.critical("Need at least 15GB free")
                  sys.exit(1)
              log.info("Pre‑flight passed")

          # ---------- disk guard ----------
          def disk_guard(min_gb=15):
              free = disk_free_gb()
              if free < min_gb:
                  log.warning("Low disk, cleaning...")
                  safe_run(["sudo", "rm", "-rf", "/usr/share/doc", "/usr/share/man", "/usr/share/locale"])
                  safe_run(["sudo", "apt-get", "clean", "-qq"])
                  clean_build_env()
                  free = disk_free_gb()
                  if free < min_gb:
                      log.critical("Still insufficient disk.")
                      sys.exit(1)

          # ---------- branch discovery ----------
          def discover_xanmod_branch():
              url = "https://api.github.com/repos/xanmod/linux/branches?per_page=100"
              data = safe_run(["curl", "-sf", "--retry", "3", "--retry-delay", "5", url],
                              "fetch XanMod branches", capture_output=True, critical=True)
              branches = json.loads(data.stdout)
              best = None
              for b in branches:
                  name = b["name"]
                  if not name[0].isdigit(): continue
                  try:
                      parts = name.split(".")
                      major = int(parts[0])
                      minor = int(parts[1]) if len(parts) > 1 else 0
                  except ValueError: continue
                  variant = 0 if "-x64v" in name else (1 if name.endswith("/main") else 2)
                  if best is None or (major, minor, -variant) > (best[0], best[1], -best[2]):
                      best = (major, minor, variant, name)
              if best is None:
                  log.critical("REPO_DISCOVERY_FAILED")
                  sys.exit(1)
              return best[3]

          # ---------- kernel build ----------
          def build_kernel(branch):
              kernel_dir = WORKSPACE / "xanmod-kernel"
              deb_out = ARTIFACTS / "kernel_debs"
              ensure_dirs(deb_out)
              clean_build_env()               # added before kernel build
              wait_for_apt()
              safe_run(["sudo", "apt-get", "install", "-y",
                   "build-essential", "libncurses-dev", "bison", "flex",
                   "libssl-dev", "libelf-dev", "bc", "git", "rsync", "kmod", "cpio",
                   "debhelper", "fakeroot", "ccache", "zstd", "dwarves", "wget", "curl", "jq"],
                   "kernel deps", critical=True)
              ensure_dirs(CCACHE_DIR)
              safe_run(["ccache", "--max-size", CCACHE_MAXSIZE])
              safe_run(["ccache", "-z"])
              if kernel_dir.exists(): shutil.rmtree(kernel_dir)
              safe_run(["git", "clone", "--depth=1", "--branch", branch,
                   "https://github.com/xanmod/linux.git", str(kernel_dir)], "clone kernel", critical=True)
              if not (kernel_dir / "Makefile").exists():
                  log.critical("Kernel source missing Makefile")
                  sys.exit(1)
              os.chdir(kernel_dir)
              _uname_r = subprocess.check_output(["uname", "-r"], text=True).strip()
              if Path(f"/boot/config-{_uname_r}").exists():
                  shutil.copy(Path(f"/boot/config-{_uname_r}"), ".config")
              else:
                  safe_run(["make", "x86_64_defconfig"])
              # kernel config (bugs 6,9‑19,86,87,95,151‑200)
              config_cmds = [
                  ("disable", c) for c in [
                      "DEBUG_INFO", "DEBUG_INFO_BTF", "DEBUG_INFO_DWARF4", "DEBUG_INFO_DWARF5",
                      "SYSTEM_TRUSTED_KEYS", "SYSTEM_REVOCATION_KEYS", "SYSTEM_EXTRA_CERTIFICATE",
                      "MNATIVE_INTEL", "PREEMPT_VOLUNTARY", "NUMA"
                  ]
              ] + [
                  ("enable", c) for c in [
                      "MSKYLAKE", "PREEMPT_DYNAMIC", "MODULE_STRIP",
                      "HZ_1000", "NO_HZ_FULL", "SCHED_AUTOGROUP",
                      "CPU_FREQ_DEFAULT_GOV_PERFORMANCE",
                      "USER_NS", "ZRAM", "ZRAM_DEF_COMP_ZSTD", "ZRAM_WRITEBACK",
                      "CRYPTO_ZSTD", "FANOTIFY", "KSM", "THP_DEFAULT_ALWAYS",
                      "TCP_CONGESTION_BBR", "DEFAULT_BBR", "NET_SCH_FQ",
                      "MQ_IOSCHED_KYBER", "IOSCHED_BFQ",
                      "DRM_I915", "INPUT_JOYDEV", "HID_GENERIC", "USB_HID", "HID_PID", "JOYSTICK_XPAD",
                      "MODULES", "MODVERSIONS", "KALLSYMS", "FUTEX2",
                      "INITRAMFS_COMPRESSION_ZSTD"
                  ]
              ] + [
                  ("set-val", "HZ", "1000"),
                  ("set-str", "DEFAULT_TCP_CONG", "bbr"),
                  ("set-str", "DEFAULT_NET_SCH", "fq"),
                  ("set-val", "RCU_NOCB_CPU", "all"),
                  ("disable", "WQ_POWER_EFFICIENT_DEFAULT"),
                  ("set-str", "SYSTEM_TRUSTED_KEYS", ""),
                  ("set-str", "SYSTEM_REVOCATION_KEYS", ""),
                  ("set-str", "MODULE_SIG_KEY", ""),
              ]
              for action, *args in config_cmds:
                  safe_run(["scripts/config", f"--{action}", f"CONFIG_{args[0]}"] + args[1:])
              safe_run(["make", "olddefconfig"])
              os.environ["MAKEFLAGS"] = MAKEFLAGS
              os.environ["KBUILD_BUILD_HOST"] = "MAHEFOOZ1710-Optiplex"
              os.environ["KBUILD_BUILD_USER"] = "mahefooz1710"
              try:
                  safe_run(["timeout", "--preserve-status", "--signal=TERM", str(KERNEL_TIMEOUT),
                       "fakeroot", "make", "CC=ccache gcc", "HOSTCC=ccache gcc",
                       f"LOCALVERSION=-mahefooz1710-skylake",
                       f"KCFLAGS={KCFLAGS}",
                       "deb-pkg"], "kernel build", critical=True)
              except subprocess.CalledProcessError as e:
                  if e.returncode == 124:
                      log.warning("TIMEOUT – saving partial debs")
                      for deb in kernel_dir.glob("*.deb"):
                          shutil.copy(deb, deb_out)
                  else:
                      log.critical("Kernel build failed")
                      sys.exit(1)
              for deb in kernel_dir.rglob("linux-*.deb"):
                  shutil.copy(deb, deb_out)
              for p in [WORKSPACE, Path.home()]:
                  for deb in p.rglob("linux-*.deb"):
                      shutil.copy(deb, deb_out)
              debs = list(deb_out.glob("*.deb"))
              if debs:
                  _hres = safe_run(["sha256sum"] + [str(d) for d in debs], capture_output=True)
                  if _hres:
                      (deb_out / "SHA256SUMS").write_text(_hres.stdout, encoding="utf-8")
              else:
                  log.warning("No kernel .deb found!")

          # ---------- graphics stack ----------
          def build_graphics(mesa_branch):
              gfx_dir = WORKSPACE / "graphics_artifacts"
              ensure_dirs(gfx_dir)
              clean_build_env()               # clean before graphics
              wait_for_apt()
              safe_run(["sudo", "apt-get", "install", "-y", "--no-install-recommends",
                   "meson", "ninja-build", "build-essential", "pkg-config",
                   "bison", "flex", "python3-mako", "python3-packaging", "python3-ply",
                   "libx11-xcb-dev", "libxdamage-dev", "libva-dev", "libdrm-dev", "git", "ccache",
                   "libvulkan-dev", "llvm-15-dev", "clang-15", "libclc-15-dev",
                   "libexpat1-dev", "libx11-dev", "libxext-dev", "libxfixes-dev",
                   "libxcb-glx0-dev", "libxcb-dri2-0-dev", "libxcb-dri3-dev",
                   "libxcb-present-dev", "libxshmfence-dev", "libxxf86vm-dev",
                   "libxrandr-dev", "libglvnd-dev", "libwayland-dev", "libelf-dev",
                   "libpciaccess-dev", "libudev-dev", "wayland-protocols",
                   "python3-setuptools", "cmake", "libgtest-dev", "spirv-tools", "libedit-dev", "libz3-dev",
                   "patchelf", "file", "zstd"], "gfx deps", critical=True)
              if not check_cmd_exists("llvm-config-15"):
                  log.critical("LLVM 15 missing")
                  sys.exit(1)
              # libdrm
              drm_dir = WORKSPACE / "drm"
              if drm_dir.exists(): shutil.rmtree(drm_dir)
              safe_run(["git", "clone", "--depth=1", "--branch", "libdrm-2.4.120",
                   "https://gitlab.freedesktop.org/mesa/drm.git", str(drm_dir)], "clone drm", critical=True)
              os.chdir(drm_dir)
              if not (drm_dir / "meson.build").exists():
                  log.critical("LibDRM missing meson.build")
                  sys.exit(1)
              safe_run(["meson", "setup", "build", "--prefix=/usr", "-Dbuildtype=release",
                   "-Dudev=true", "-Dintel=true",
                   f"-Dc_args={CFLAGS}", f"-Dcpp_args={CXXFLAGS}"], "drm meson", critical=True)
              safe_run(["ninja", f"-j{NINJA_JOBS}", "-C", "build"], "drm ninja", critical=True)
              safe_run(["ninja", f"-j{NINJA_JOBS}", "-C", "build", "install"], "drm install", critical=True, env={**os.environ, "DESTDIR": str(gfx_dir)})
              # mesa
              mesa_dir = WORKSPACE / "mesa"
              if mesa_dir.exists(): shutil.rmtree(mesa_dir)
              safe_run(["git", "clone", "--depth=1", "-b", mesa_branch,
                   "https://gitlab.freedesktop.org/mesa/mesa.git", str(mesa_dir)], "clone mesa", critical=True)
              os.chdir(mesa_dir)
              if not (mesa_dir / "meson.build").exists():
                  log.critical("Mesa missing meson.build")
                  sys.exit(1)
              os.environ["LLVM_CONFIG"] = "/usr/bin/llvm-config-15"
              safe_run(["meson", "setup", "build", "--prefix=/usr", "-Dbuildtype=release", "-Doptimization=3",
                   "-Dgallium-drivers=iris,swrast", "-Dvulkan-drivers=intel",
                   "-Dllvm=enabled", "-Dshared-llvm=disabled",
                   "-Dplatforms=x11,wayland", "-Dgles1=enabled", "-Dgles2=enabled",
                   "-Dopengl=enabled", "-Dgbm=enabled", "-Dglx=dri", "-Degl=enabled",
                   "-Dshared-glapi=enabled", "-Dvalgrind=disabled",
                   f"-Dc_args={CFLAGS}", f"-Dcpp_args={CXXFLAGS}"], "mesa meson", critical=True)
              safe_run(["ninja", f"-j{NINJA_JOBS}", "-C", "build"], "mesa ninja", critical=True)
              safe_run(["ninja", f"-j{NINJA_JOBS}", "-C", "build", "install"], "mesa install", critical=True, env={**os.environ, "DESTDIR": str(gfx_dir)})
              # intel media
              for repo, cmake_extra in [("gmmlib", []), ("media-driver", ["-DMEDIA_RUN_TEST_SUITE=OFF"])]:
                  src = WORKSPACE / repo
                  if src.exists(): shutil.rmtree(src)
                  safe_run(["git", "clone", "--depth=1", f"https://github.com/intel/{repo}.git", str(src)],
                           f"clone {repo}", critical=True)
                  os.chdir(src)
                  if not (src / "CMakeLists.txt").exists():
                      log.critical(f"{repo} missing CMakeLists.txt")
                      sys.exit(1)
                  safe_run(["cmake", "-S", ".", "-B", "build",
                       "-DCMAKE_BUILD_TYPE=Release", "-DCMAKE_INSTALL_PREFIX=/usr",
                       f"-DCMAKE_C_FLAGS={CFLAGS}", f"-DCMAKE_CXX_FLAGS={CXXFLAGS}"] + cmake_extra,
                       f"{repo} cmake", critical=True)
                  safe_run(["cmake", "--build", "build", "-j", str(BUILD_JOBS)], f"{repo} build", critical=True)
                  safe_run(["cmake", "--install", "build", "--prefix", str(gfx_dir / "usr")],
                           f"{repo} install", critical=True)
              os.chdir(gfx_dir)
              for so in gfx_dir.rglob("*.so*"):
                  safe_run(["patchelf", "--set-rpath", "$ORIGIN/../lib/x86_64-linux-gnu:$ORIGIN", str(so)])
                  safe_run(["strip", "--strip-unneeded", str(so)])
              for lib in ["usr/lib/x86_64-linux-gnu/libdrm_intel.so.1", "usr/lib/x86_64-linux-gnu/dri/iris_dri.so"]:
                  libpath = gfx_dir / lib
                  if libpath.exists():
                      out = safe_run(["ldd", str(libpath)], capture_output=True)
                      if out and "not found" in out.stdout:
                          log.warning("Missing deps in %s:\n%s", lib, out.stdout)
              runtime = gfx_dir / "runtime"
              ensure_dirs(runtime)
              write_file(runtime / "env-graphics.sh", """#!/bin/bash
          export LD_LIBRARY_PATH="$(dirname "${BASH_SOURCE[0]}")/../usr/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH"
          export LIBGL_DRIVERS_PATH="$(dirname "${BASH_SOURCE[0]}")/../usr/lib/x86_64-linux-gnu/dri"
          export VK_LAYER_PATH="$(dirname "${BASH_SOURCE[0]}")/../usr/share/vulkan/explicit_layer.d:$VK_LAYER_PATH"
          """)
              (runtime / "env-graphics.sh").chmod(0o755)
              archive = ARTIFACTS / "graphics-stack-skylake.tar.zst"
              safe_run(["tar", "-c", "-I", "zstd -9 -T0", "-f", str(archive), "."], "archive graphics", critical=True)
              _sha = safe_run(["sha256sum", str(archive)], capture_output=True)
              if _sha: log.info("SHA256: %s", _sha.stdout.strip())
              log.info("Graphics stack done.")

          # ---------- gaming stack (SDL2, GameMode, MangoHud, vkBasalt) ----------
          def build_gaming_stack():
              game_dir = WORKSPACE / "gaming_stack"
              ensure_dirs(game_dir)
              clean_build_env()               # clean before gaming
              def install_gaming_deps():
                  try:
                      wait_for_apt()
                      safe_run(["sudo", "apt-get", "install", "-y", "--no-install-recommends",
                           "meson", "ninja-build", "build-essential",
                           "libdbus-1-dev", "libinih-dev", "libsystemd-dev", "libx11-dev", "libxext-dev",
                           "libwayland-dev", "libvulkan-dev", "libgl1-mesa-dev", "libegl1-mesa-dev",
                           "libdrm-dev", "git", "python3-mako", "python3-setuptools", "ccache",
                           "libhidapi-dev", "wayland-protocols", "libpulse-dev",
                           "libavcodec-dev=4.4.*", "libavformat-dev=4.4.*", "libavutil-dev", "libswscale-dev",
                           "libpng-dev", "libjpeg-dev", "libxkbcommon-dev", "libxrandr-dev", "libxinerama-dev",
                           "libxcursor-dev", "libxi-dev", "file", "patchelf", "zstd",
                           "libevdev-dev"], "gaming deps (pinned)", critical=True)
                  except Exception:
                      wait_for_apt()
                      safe_run(["sudo", "apt-get", "install", "-y", "--no-install-recommends",
                           "meson", "ninja-build", "build-essential",
                           "libdbus-1-dev", "libinih-dev", "libsystemd-dev", "libx11-dev", "libxext-dev",
                           "libwayland-dev", "libvulkan-dev", "libgl1-mesa-dev", "libegl1-mesa-dev",
                           "libdrm-dev", "git", "python3-mako", "python3-setuptools", "ccache",
                           "libhidapi-dev", "wayland-protocols", "libpulse-dev",
                           "libavcodec-dev", "libavformat-dev", "libavutil-dev", "libswscale-dev",
                           "libpng-dev", "libjpeg-dev", "libxkbcommon-dev", "libxrandr-dev", "libxinerama-dev",
                           "libxcursor-dev", "libxi-dev", "file", "patchelf", "zstd",
                           "libevdev-dev"], "gaming deps (fallback)", critical=True)
              install_gaming_deps()
              # SDL2
              sdl_dir = WORKSPACE / "SDL"
              if sdl_dir.exists(): shutil.rmtree(sdl_dir)
              safe_run(["git", "clone", "--depth=1", "--branch", "release-2.30.1",
                   "https://github.com/libsdl-org/SDL.git", str(sdl_dir)], "clone SDL2", critical=True)
              os.chdir(sdl_dir)
              if not (sdl_dir / "CMakeLists.txt").exists():
                  log.critical("SDL2 missing CMakeLists.txt")
                  sys.exit(1)
              safe_run(["cmake", "-S", ".", "-B", "build",
                   "-DCMAKE_BUILD_TYPE=Release", "-DCMAKE_INSTALL_PREFIX=/usr",
                   "-DVIDEO_WAYLAND=ON", "-DVIDEO_X11=ON", "-DVIDEO_OPENGL=ON", "-DVIDEO_OPENGLES=ON",
                   "-DSDL_HIDAPI=ON", "-DCMAKE_C_COMPILER_LAUNCHER=ccache",
                   f"-DCMAKE_C_FLAGS={CFLAGS}", f"-DCMAKE_CXX_FLAGS={CXXFLAGS}"], "SDL2 cmake", critical=True)
              safe_run(["cmake", "--build", "build", "-j", str(BUILD_JOBS)], "SDL2 build", critical=True)
              safe_run(["cmake", "--install", "build", "--prefix", str(game_dir / "usr")], "SDL2 install", critical=True)
              # GameMode
              gm_dir = WORKSPACE / "gamemode"
              if gm_dir.exists(): shutil.rmtree(gm_dir)
              safe_run(["git", "clone", "--depth=1", "https://github.com/FeralInteractive/gamemode.git", str(gm_dir)],
                       "clone gamemode", critical=True)
              os.chdir(gm_dir)
              if not (gm_dir / "meson.build").exists():
                  log.critical("GameMode missing meson.build")
                  sys.exit(1)
              safe_run(["meson", "setup", "builddir", "--prefix=/usr", "--buildtype=release",
                   "-Dwith-sd-bus-provider=libsystemd", "-Dwith-examples=false", "-Dwith-util=false",
                   f"-Dc_args={CFLAGS}", f"-Dcpp_args={CXXFLAGS}"], "gamemode meson", critical=True)
              safe_run(["ninja", f"-j{NINJA_JOBS}", "-C", "builddir"], "gamemode ninja", critical=True)
              safe_run(["ninja", f"-j{NINJA_JOBS}", "-C", "builddir", "install"], "gamemode install", critical=True, env={**os.environ, "DESTDIR": str(game_dir)})
              # MangoHud
              mh_dir = WORKSPACE / "MangoHud"
              if mh_dir.exists(): shutil.rmtree(mh_dir)
              safe_run(["git", "clone", "--depth=1", "--recurse-submodules",
                   "https://github.com/flightlessmango/MangoHud.git", str(mh_dir)], "clone MangoHud", critical=True)
              os.chdir(mh_dir)
              if not (mh_dir / "meson.build").exists():
                  log.critical("MangoHud missing meson.build")
